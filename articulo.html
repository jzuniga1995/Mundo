<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="/favicon_tierra.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_tierra.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_tierra.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon_tierra.png">


  <title id="pageTitle">Cargando... — Cronicas Cosmicas</title>
  <meta id="metaDesc" name="description" content="">
  <meta id="ogTitle" property="og:title" content="">
  <meta id="ogDesc" property="og:description" content="">
  <meta id="ogImage" property="og:image" content="">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="es_ES">
  <link rel="canonical" href="" id="canonicalTag">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .article-hero {
      position: relative;
      width: 100%;
      height: clamp(260px, 45vw, 520px);
      overflow: hidden;
      margin-top: var(--header-h);
      background: #07192e;
    }
    .article-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.72;
      display: block;
      transition: opacity 0.6s ease;
    }
    .article-hero img.loaded { opacity: 0.72; }
    .article-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.05) 55%, var(--bg-base) 100%);
      pointer-events: none;
    }
    .hero-cat-badge {
      position: absolute;
      bottom: 1.5rem;
      left: clamp(1rem, 5vw, 2.5rem);
      z-index: 2;
      background: rgba(158, 114, 40, 0.9);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }
    .article-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 clamp(1.2rem, 6vw, 2.5rem) clamp(3rem, 8vw, 6rem);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-muted);
      font-size: 0.76rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin: 2rem 0 1.5rem;
      transition: color 0.2s;
      cursor: pointer;
    }
    .back-link:hover { color: var(--accent-gold); }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .meta-category {
      color: var(--accent-gold);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid rgba(158,114,40,0.3);
      padding: 0.22rem 0.65rem;
      border-radius: var(--radius);
    }
    .meta-date { color: var(--text-muted); font-size: 0.8rem; font-weight: 300; }
    .article-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 600;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 1.2rem;
    }
    .article-lead {
      font-size: clamp(1.05rem, 2.5vw, 1.18rem);
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .article-body { font-size: clamp(1rem, 2vw, 1.06rem); font-weight: 300; line-height: 1.92; color: var(--text-primary); }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: clamp(1.45rem, 3.5vw, 2rem);
      font-weight: 600;
      color: var(--text-primary);
      margin: 2.8rem 0 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-soft);
    }
    .article-body h3 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.5vw, 1.45rem);
      font-weight: 600;
      color: var(--accent-gold);
      margin: 2rem 0 0.75rem;
    }
    .article-body p { margin-bottom: 1.45rem; }
    .article-body blockquote {
      border-left: 2px solid var(--accent-gold);
      margin: 2.2rem 0;
      padding: 1.1rem clamp(1rem, 3vw, 1.8rem);
      background: var(--bg-surface);
      font-style: italic;
      font-size: 1.08rem;
      color: var(--text-secondary);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .article-body strong { color: var(--text-primary); font-weight: 600; }
    .article-body ul, .article-body ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
    .article-body li { margin-bottom: 0.5rem; }
    .loading-state {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
    }
    @media (max-width: 640px) {
      .article-hero { height: clamp(200px, 55vw, 320px); }
      .article-title { font-size: clamp(1.7rem, 6vw, 2.2rem); }
    }
    @media (max-width: 380px) {
      .article-title { font-size: 1.55rem; }
      .article-lead  { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Cronicas<span>Cosmicas</span></a>
      <nav>
        <ul class="header-nav" id="headerNav">
          <li><a href="index.html">Universo</a></li>
          <li><a href="index.html">Tierra</a></li>
          <li><a href="index.html">Evolución</a></li>
          <li><a href="index.html">Civilizaciones</a></li>
          <li><a href="index.html">Ver todo</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="article-hero" id="articleHero" style="display:none;">
    <img id="heroImg" src="" alt="">
    <span class="hero-cat-badge" id="heroCatBadge"></span>
  </div>

  <div class="article-container">
    <a class="back-link" onclick="history.length > 1 ? history.back() : location.href='index.html'">
      &#8592; Volver
    </a>
    <div id="articleContent">
      <div class="loading-state">Cargando artículo…</div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Cronicas Cosmicas &mdash; Una enciclopedia del universo en español</p>
  </footer>

  <script>
    const JSON_FILES = [
      'data/universo.json','data/tierra.json','data/evolucion.json',
      'data/civilizaciones.json','data/historia.json','data/ciencia.json'
    ];

    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) location.href = 'index.html';

    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('headerNav').classList.toggle('open');
    });
    document.getElementById('headerNav').addEventListener('click', e => {
      if (e.target.tagName === 'A') document.getElementById('headerNav').classList.remove('open');
    });

    async function loadArticle() {
      try {
        const results = await Promise.all(
          JSON_FILES.map(f => fetch(f).then(r => r.json()).catch(() => []))
        );
        const article = results.flat().find(a => a.slug === slug);
        if (!article) {
          document.getElementById('articleContent').innerHTML =
            '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Artículo no encontrado.</p>';
          return;
        }
        renderArticle(article);
      } catch(e) {
        document.getElementById('articleContent').innerHTML =
          '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Error al cargar el artículo.</p>';
      }
    }

    function renderArticle(a) {
      // Title
      document.getElementById('pageTitle').textContent = a.titulo + ' — Cronicas Cosmicas';

      // Meta description
      document.getElementById('metaDesc').content = a.descripcion || '';

      // Open Graph
      document.getElementById('ogTitle').content = a.titulo;
      document.getElementById('ogDesc').content  = a.descripcion || '';
      document.getElementById('ogImage').content = a.imagen || '';

      // Canonical — clave para SEO
      document.getElementById('canonicalTag').href =
        window.location.origin + '/articulo.html?slug=' + a.slug;

      // Schema.org Article
      const s = document.createElement('script');
      s.type = 'application/ld+json';
      s.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": a.titulo,
        "description": a.descripcion || '',
        "image": a.imagen || '',
        "datePublished": a.fecha || '',
        "inLanguage": "es",
        "url": window.location.origin + '/articulo.html?slug=' + a.slug,
        "publisher": {
          "@type": "Organization",
          "name": "Cronicas Cosmicas",
          "url": window.location.origin
        }
      });
      document.head.appendChild(s);

      // Hero image
      if (a.imagen) {
        const hero  = document.getElementById('articleHero');
        const img   = document.getElementById('heroImg');
        const badge = document.getElementById('heroCatBadge');
        img.alt   = a.imagen_alt || a.titulo;
        badge.textContent = a.categoria || '';
        hero.style.display = 'block';
        img.onload  = () => img.classList.add('loaded');
        img.onerror = () => { hero.style.display = 'none'; };
        img.src = a.imagen;
      }

      // Contenido
      document.getElementById('articleContent').innerHTML =
        '<div class="article-meta">'
        + '<span class="meta-category">' + (a.categoria || '') + '</span>'
        + '<span class="meta-date">' + fmtDate(a.fecha) + '</span>'
        + '</div>'
        + '<h1 class="article-title">' + a.titulo + '</h1>'
        + '<p class="article-lead">' + (a.descripcion || '') + '</p>'
        + '<div class="article-body">' + (a.contenido || '') + '</div>';
    }

    function fmtDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
    }

    loadArticle();
  </script>
</body>
</html>
