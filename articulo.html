<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="/favicon_tierra.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_tierra.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_tierra.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_tierra.png">

  <title id="pageTitle">Cargando... — Cronicas Cosmicas</title>
  <meta id="metaDesc" name="description" content="">
  <meta id="ogTitle" property="og:title" content="">
  <meta id="ogDesc" property="og:description" content="">
  <meta id="ogImage" property="og:image" content="">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="es_ES">
  <link rel="canonical" href="" id="canonicalTag">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ── Barra de progreso de lectura ──────────────────────── */
    #readProgress {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-gold, #9e7228), #e2a84b);
      z-index: 9999;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    /* ── Hero ──────────────────────────────────────────────── */
    .article-hero {
      position: relative;
      width: 100%;
      height: clamp(260px, 45vw, 520px);
      overflow: hidden;
      margin-top: var(--header-h);
      background: #07192e;
    }
    .article-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      display: block;
      transition: opacity 0.6s ease;
    }
    .article-hero img.loaded { opacity: 0.72; }
    .article-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.05) 55%, var(--bg-base) 100%);
      pointer-events: none;
    }
    .hero-cat-badge {
      position: absolute;
      bottom: 1.5rem;
      left: clamp(1rem, 5vw, 2.5rem);
      z-index: 2;
      background: rgba(158, 114, 40, 0.9);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }

    /* ── Contenedor ────────────────────────────────────────── */
    .article-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 clamp(1.2rem, 6vw, 2.5rem) clamp(3rem, 8vw, 6rem);
    }

    /* ── Botón volver ──────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-muted);
      font-size: 0.76rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin: 2rem 0 1.5rem;
      transition: color 0.2s;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: none;
    }
    .back-link:hover,
    .back-link:focus-visible { color: var(--accent-gold); outline: none; }
    .back-link:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 3px; border-radius: 2px; }

    /* ── Meta, título, lead, body ──────────────────────────── */
    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .meta-category {
      color: var(--accent-gold);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid rgba(158,114,40,0.3);
      padding: 0.22rem 0.65rem;
      border-radius: var(--radius);
    }
    .meta-date { color: var(--text-muted); font-size: 0.8rem; font-weight: 300; }
    .article-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 600;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 1.2rem;
    }
    .article-lead {
      font-size: clamp(1.05rem, 2.5vw, 1.18rem);
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .article-body { font-size: clamp(1rem, 2vw, 1.06rem); font-weight: 300; line-height: 1.92; color: var(--text-primary); }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: clamp(1.45rem, 3.5vw, 2rem);
      font-weight: 600;
      color: var(--text-primary);
      margin: 2.8rem 0 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-soft);
    }
    .article-body h3 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.5vw, 1.45rem);
      font-weight: 600;
      color: var(--accent-gold);
      margin: 2rem 0 0.75rem;
    }
    .article-body p { margin-bottom: 1.45rem; }
    .article-body blockquote {
      border-left: 2px solid var(--accent-gold);
      margin: 2.2rem 0;
      padding: 1.1rem clamp(1rem, 3vw, 1.8rem);
      background: var(--bg-surface);
      font-style: italic;
      font-size: 1.08rem;
      color: var(--text-secondary);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .article-body strong { color: var(--text-primary); font-weight: 600; }
    .article-body ul, .article-body ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
    .article-body li { margin-bottom: 0.5rem; }
    .article-body hr { border: none; border-top: 1px solid var(--border-soft); margin: 2.5rem 0; }

    /* ── Compartir ─────────────────────────────────────────── */
    .share-section {
      margin: 2.5rem 0;
      padding: 1.5rem;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: var(--bg-surface);
    }
    .share-section h3 {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 1rem;
    }
    .share-buttons { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-weight: 400;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      background: none;
    }
    .share-btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .share-btn:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 2px; }
    .share-btn-x    { border-color: rgba(255,255,255,0.15); color: var(--text-primary); }
    .share-btn-wa   { border-color: rgba(37,211,102,0.35);  color: #25d366; }
    .share-btn-fb   { border-color: rgba(66,103,178,0.4);   color: #4267b2; }
    .share-btn-link { border-color: rgba(158,114,40,0.35);  color: var(--accent-gold); }
    .share-btn-link.copied { border-color: rgba(40,180,100,0.4); color: #28b464; }

    /* ── Artículos relacionados ────────────────────────────── */
    .related-section {
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border-soft);
    }
    .related-section h2 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }
    .related-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-surface);
      transition: border-color 0.2s, transform 0.2s;
    }
    .related-card:hover { border-color: rgba(158,114,40,0.4); transform: translateY(-3px); }
    .related-card:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 2px; }
    .related-card img { width: 100%; height: 130px; object-fit: cover; display: block; opacity: 0.85; }
    .related-card-body { padding: 0.9rem; }
    .related-card-cat {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 0.4rem;
    }
    .related-card-title {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      display: -webkit-box;
      line-clamp: 3; 
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Loading ───────────────────────────────────────────── */
    .loading-state {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .article-hero { height: clamp(200px, 55vw, 320px); }
      .article-title { font-size: clamp(1.7rem, 6vw, 2.2rem); }
      .related-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 380px) {
      .article-title { font-size: 1.55rem; }
      .article-lead  { font-size: 1rem; }
      .related-grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Barra de progreso de lectura -->
  <div id="readProgress" aria-hidden="true"></div>

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Cronicas<span>Cosmicas</span></a>
      <nav aria-label="Navegación principal">
        <ul class="header-nav" id="headerNav">
          <li><a href="index.html">Universo</a></li>
          <li><a href="index.html">Tierra</a></li>
          <li><a href="index.html">Evolución</a></li>
          <li><a href="index.html">Civilizaciones</a></li>
          <li><a href="index.html">Ver todo</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="headerNav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="article-hero" id="articleHero" style="display:none;" aria-hidden="true">
    <img id="heroImg" src="" alt="">
    <span class="hero-cat-badge" id="heroCatBadge"></span>
  </div>

  <div class="article-container">
    <button class="back-link" id="backBtn" aria-label="Volver a la página anterior">
      &#8592; Volver
    </button>
    <div id="articleContent">
      <div class="loading-state">Cargando artículo…</div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Cronicas Cosmicas &mdash; Una enciclopedia del universo en español</p>
  </footer>

  <script>
    var JSON_FILES = [
      'data/universo.json','data/tierra.json','data/evolucion.json',
      'data/civilizaciones.json','data/historia.json','data/ciencia.json'
    ];

    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) location.href = 'index.html';

    // Barra de progreso de lectura
    window.addEventListener('scroll', function() {
      var docEl = document.documentElement;
      var scrollTop = docEl.scrollTop || document.body.scrollTop;
      var scrollH = Math.max(document.body.scrollHeight, docEl.scrollHeight) - docEl.clientHeight;
      var pct = scrollH > 0 ? Math.min(100, (scrollTop / scrollH) * 100) : 0;
      document.getElementById('readProgress').style.width = pct.toFixed(1) + '%';
    }, { passive: true });

    // Menú móvil
    document.getElementById('navToggle').addEventListener('click', function() {
      var nav = document.getElementById('headerNav');
      var btn = document.getElementById('navToggle');
      var isOpen = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
      btn.setAttribute('aria-label', isOpen ? 'Cerrar menú' : 'Abrir menú');
    });
    document.getElementById('headerNav').addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        document.getElementById('headerNav').classList.remove('open');
        document.getElementById('navToggle').setAttribute('aria-expanded', 'false');
        document.getElementById('navToggle').setAttribute('aria-label', 'Abrir menú');
      }
    });

    // Botón volver
    document.getElementById('backBtn').addEventListener('click', function() {
      if (history.length > 1) history.back();
      else location.href = 'index.html';
    });

    async function loadArticle() {
      try {
        const results = await Promise.all(
          JSON_FILES.map(f => fetch(f).then(r => r.json()).catch(() => []))
        );
        const allArticles = results.flat();
        const article = allArticles.find(a => a.slug === slug);
        if (!article) {
          document.getElementById('articleContent').innerHTML =
            '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Artículo no encontrado.</p>';
          return;
        }
        renderArticle(article, allArticles);
      } catch(e) {
        document.getElementById('articleContent').innerHTML =
          '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Error al cargar el artículo.</p>';
      }
    }

    function renderArticle(a, allArticles) {
      // Title
      document.getElementById('pageTitle').textContent = a.titulo + ' — Cronicas Cosmicas';

      // Meta description
      document.getElementById('metaDesc').content = a.descripcion || '';

      // Open Graph
      document.getElementById('ogTitle').content = a.titulo;
      document.getElementById('ogDesc').content  = a.descripcion || '';
      document.getElementById('ogImage').content = a.imagen || '';

      // Canonical — clave para SEO
      document.getElementById('canonicalTag').href =
        window.location.origin + '/articulo.html?slug=' + a.slug;

      // Schema.org Article
      const s = document.createElement('script');
      s.type = 'application/ld+json';
      s.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": a.titulo,
        "description": a.descripcion || '',
        "image": a.imagen || '',
        "datePublished": a.fecha || '',
        "inLanguage": "es",
        "url": window.location.origin + '/articulo.html?slug=' + a.slug,
        "author": { "@type": "Organization", "name": "Cronicas Cosmicas" },
        "publisher": {
          "@type": "Organization",
          "name": "Cronicas Cosmicas",
          "url": window.location.origin
        }
      });
      document.head.appendChild(s);

      // Hero image
      if (a.imagen) {
        const hero  = document.getElementById('articleHero');
        const img   = document.getElementById('heroImg');
        const badge = document.getElementById('heroCatBadge');
        img.alt           = a.imagen_alt || a.titulo;
        badge.textContent = a.categoria || '';
        hero.style.display = 'block';
        hero.removeAttribute('aria-hidden');
        img.onload  = () => img.classList.add('loaded');
        img.onerror = () => { hero.style.display = 'none'; };
        img.src = a.imagen;
      }

      // Botones de compartir
      const pageUrl      = window.location.href;
      const encodedUrl   = encodeURIComponent(pageUrl);
      const encodedTitle = encodeURIComponent(a.titulo);

      const shareHTML = '<div class="share-section">'
        + '<h3>Compartir este artículo</h3>'
        + '<div class="share-buttons">'
        + '<a class="share-btn share-btn-x" href="https://twitter.com/intent/tweet?text=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener noreferrer" aria-label="Compartir en X">X / Twitter</a>'
        + '<a class="share-btn share-btn-wa" href="https://api.whatsapp.com/send?text=' + encodedTitle + '%20' + encodedUrl + '" target="_blank" rel="noopener noreferrer" aria-label="Compartir por WhatsApp">WhatsApp</a>'
        + '<a class="share-btn share-btn-fb" href="https://www.facebook.com/sharer/sharer.php?u=' + encodedUrl + '" target="_blank" rel="noopener noreferrer" aria-label="Compartir en Facebook">Facebook</a>'
        + '<button class="share-btn share-btn-link" id="copyLinkBtn"><span id="copyLinkText">Copiar enlace</span></button>'
        + '</div></div>';

      // Artículos relacionados
      const fallbackImg = 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=800&q=60';
      const related = (allArticles || [])
        .filter(r => r.slug !== a.slug && r.categoria === a.categoria)
        .slice(0, 3);

      const relatedHTML = related.length > 0
        ? '<section class="related-section" aria-label="Artículos relacionados">'
          + '<h2>También te puede interesar</h2>'
          + '<div class="related-grid">'
          + related.map(r =>
              '<a href="' + r.slug + '.html" class="related-card">'
              + '<img src="' + (r.imagen || fallbackImg) + '" alt="' + (r.imagen_alt || r.titulo) + '" loading="lazy" decoding="async" onerror="this.src=\'' + fallbackImg + '\'">'
              + '<div class="related-card-body">'
              + '<div class="related-card-cat">' + r.categoria + '</div>'
              + '<div class="related-card-title">' + r.titulo + '</div>'
              + '</div></a>'
            ).join('')
          + '</div></section>'
        : '';

      // Contenido
      document.getElementById('articleContent').innerHTML =
        '<div class="article-meta">'
        + '<span class="meta-category">' + (a.categoria || '') + '</span>'
        + '<span class="meta-date"><time datetime="' + (a.fecha || '') + '">' + fmtDate(a.fecha) + '</time></span>'
        + '</div>'
        + '<h1 class="article-title">' + a.titulo + '</h1>'
        + '<p class="article-lead">' + (a.descripcion || '') + '</p>'
        + '<div class="article-body">' + (a.contenido || '') + '</div>'
        + shareHTML
        + relatedHTML;

      // Copiar enlace
      document.getElementById('copyLinkBtn').addEventListener('click', function() {
        const textSpan = document.getElementById('copyLinkText');
        const btn = document.getElementById('copyLinkBtn');
        if (navigator.clipboard) {
          navigator.clipboard.writeText(pageUrl).then(() => {
            btn.classList.add('copied');
            textSpan.textContent = '¡Enlace copiado!';
            setTimeout(() => { btn.classList.remove('copied'); textSpan.textContent = 'Copiar enlace'; }, 2500);
          });
        } else {
          const ta = document.createElement('textarea');
          ta.value = pageUrl; ta.style.cssText = 'position:fixed;opacity:0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          textSpan.textContent = '¡Copiado!';
          setTimeout(() => { textSpan.textContent = 'Copiar enlace'; }, 2500);
        }
      });
    }

    function fmtDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
    }

    loadArticle();
  </script>
</body>
</html>
