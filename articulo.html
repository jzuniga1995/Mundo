<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Cargando... — Cronicas Cosmicas</title>
  <meta id="metaDesc" name="description" content="">
  <meta id="ogTitle" property="og:title" content="">
  <meta id="ogDesc" property="og:description" content="">
  <meta id="ogImage" property="og:image" content="">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="es_ES">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Cronicas<span>Cosmicas</span></a>
      <nav>
        <ul class="header-nav">
          <li><a href="index.html#universo">Universo</a></li>
          <li><a href="index.html#tierra">Tierra</a></li>
          <li><a href="index.html#evolucion">Evolución</a></li>
          <li><a href="index.html#civilizaciones">Civilizaciones</a></li>
          <li><a href="index.html#todos">Ver todo</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO IMAGE -->
  <div class="article-hero" id="articleHero" style="display:none; margin-top: 68px;">
    <img id="heroImg" src="" alt="">
  </div>

  <!-- CONTENT -->
  <div class="article-container">
    <a href="javascript:history.back()" class="back-link">&#8592; Volver</a>
    <div id="articleContent">
      <div class="loading">Cargando articulo...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Cronicas Cosmicas &mdash; Una enciclopedia del universo en español</p>
  </footer>

  <script>
    // ── CONFIG: mismos archivos que index.html ──
    const JSON_FILES = [
      'data/universo.json',
      'data/tierra.json',
      'data/evolucion.json',
      'data/civilizaciones.json',
      'data/historia.json',
      'data/ciencia.json'
    ];

    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) window.location.href = 'index.html';

    async function loadArticle() {
      try {
        // Busca el articulo en todos los JSON en paralelo
        const promises = JSON_FILES.map(f => fetch(f).then(r => r.json()).catch(() => []));
        const results = await Promise.all(promises);
        const allArticles = results.flat();
        const article = allArticles.find(a => a.slug === slug);

        if (!article) {
          document.getElementById('articleContent').innerHTML =
            '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Articulo no encontrado.</p>';
          return;
        }
        renderArticle(article);
      } catch (e) {
        document.getElementById('articleContent').innerHTML =
          '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Error al cargar el articulo.</p>';
      }
    }

    function renderArticle(a) {
      document.getElementById('pageTitle').textContent = `${a.titulo} — Cronicas Cosmicas`;
      document.getElementById('metaDesc').content = a.descripcion;
      document.getElementById('ogTitle').content = a.titulo;
      document.getElementById('ogDesc').content = a.descripcion;
      document.getElementById('ogImage').content = a.imagen;

      // Schema.org
      const schema = document.createElement('script');
      schema.type = 'application/ld+json';
      schema.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": a.titulo,
        "description": a.descripcion,
        "image": a.imagen,
        "datePublished": a.fecha,
        "inLanguage": "es",
        "publisher": { "@type": "Organization", "name": "Cronicas Cosmicas" }
      });
      document.head.appendChild(schema);

      if (a.imagen) {
        document.getElementById('heroImg').src = a.imagen;
        document.getElementById('heroImg').alt = a.imagen_alt || a.titulo;
        document.getElementById('articleHero').style.display = 'block';
      }

      document.getElementById('articleContent').innerHTML = `
        <div class="article-meta">
          <span class="meta-category">${a.categoria}</span>
          <span class="meta-date">${formatDate(a.fecha)}</span>
        </div>
        <h1 class="article-title">${a.titulo}</h1>
        <p class="article-lead">${a.descripcion}</p>
        <div class="article-body">${a.contenido}</div>
      `;
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    loadArticle();
  </script>
</body>
</html>
